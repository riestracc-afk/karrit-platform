<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- White background -->
  <rect width="1200" height="400" fill="white"/>
  
  <!-- Motion lines (left) -->
  <line x1="40" y1="160" x2="100" y2="160" stroke="#ff5500" stroke-width="16" stroke-linecap="round"/>
  <line x1="40" y1="220" x2="100" y2="220" stroke="#ff5500" stroke-width="16" stroke-linecap="round"/>
  <line x1="40" y1="280" x2="100" y2="280" stroke="#ff5500" stroke-width="16" stroke-linecap="round"/>
  
  <!-- Truck container (main bed) with thick border -->
  <path d="M 130 140 L 130 120 Q 130 100 150 100 L 650 100 Q 670 100 670 120 L 670 300 Q 670 320 650 320 L 130 320 Q 110 320 110 300 L 110 140" 
        fill="none" stroke="#003d7a" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Container fill (subtle) -->
  <rect x="130" y="130" width="540" height="180" fill="#f0f8ff" rx="10"/>
  
  <!-- Truck cabin (right side) - Orange -->
  <path d="M 670 120 L 780 100 Q 820 100 820 140 L 820 280 Q 820 320 780 320 L 670 320 Z" fill="#ff5500"/>
  
  <!-- Cabin window detail -->
  <rect x="710" y="140" width="80" height="80" fill="#003d7a" opacity="0.15" rx="5"/>
  
  <!-- Main wheels -->
  <g>
    <!-- Front left wheel -->
    <circle cx="220" cy="340" r="40" fill="none" stroke="#003d7a" stroke-width="12"/>
    <circle cx="220" cy="340" r="18" fill="#003d7a"/>
    
    <!-- Back wheel -->
    <circle cx="550" cy="340" r="40" fill="none" stroke="#003d7a" stroke-width="12"/>
    <circle cx="550" cy="340" r="18" fill="#003d7a"/>
    
    <!-- Cabin wheel -->
    <circle cx="770" cy="340" r="40" fill="none" stroke="#003d7a" stroke-width="12"/>
    <circle cx="770" cy="340" r="18" fill="#003d7a"/>
  </g>
  
  <!-- Axle lines -->
  <line x1="110" y1="320" x2="840" y2="320" stroke="#003d7a" stroke-width="8"/>
  
  <!-- Main text "Karry" -->
  <text x="520" y="240" font-family="Arial, Helvetica, sans-serif" font-size="180" font-weight="bold" fill="#003d7a" text-anchor="middle" dominant-baseline="middle">Karry</text>
  
  <!-- Accent "5" in orange (truck shape) -->
  <text x="900" y="240" font-family="Arial, Helvetica, sans-serif" font-size="180" font-weight="bold" fill="#ff5500" text-anchor="middle" dominant-baseline="middle">5</text>
</svg>