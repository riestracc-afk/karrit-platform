<svg viewBox="0 0 500 250" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <style>
      text { font-family: 'Arial', sans-serif; font-weight: bold; }
    </style>
  </defs>
  
  <!-- Motion lines (left) -->
  <line x1="20" y1="95" x2="50" y2="95" stroke="#ff6d00" stroke-width="8" stroke-linecap="round"/>
  <line x1="20" y1="125" x2="50" y2="125" stroke="#ff6d00" stroke-width="8" stroke-linecap="round"/>
  <line x1="20" y1="155" x2="50" y2="155" stroke="#ff6d00" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Container (truck bed) - Navy blue -->
  <rect x="70" y="80" width="200" height="100" rx="15" ry="15" fill="none" stroke="#003d7a" stroke-width="10"/>
  
  <!-- Cabin (truck cab) - Orange -->
  <path d="M 270 80 L 320 80 Q 340 80 340 100 L 340 160 Q 340 180 320 180 L 270 180 Z" fill="#ff6d00"/>
  
  <!-- Cabin window -->
  <rect x="280" y="95" width="45" height="40" rx="5" fill="#003d7a" opacity="0.3"/>
  
  <!-- Wheels -->
  <g>
    <!-- Front wheel left -->
    <circle cx="120" cy="190" r="18" fill="none" stroke="#003d7a" stroke-width="6"/>
    <circle cx="120" cy="190" r="10" fill="#003d7a"/>
    
    <!-- Rear wheel -->
    <circle cx="220" cy="190" r="18" fill="none" stroke="#003d7a" stroke-width="6"/>
    <circle cx="220" cy="190" r="10" fill="#003d7a"/>
    
    <!-- Cabin wheel -->
    <circle cx="310" cy="190" r="18" fill="none" stroke="#003d7a" stroke-width="6"/>
    <circle cx="310" cy="190" r="10" fill="#003d7a"/>
  </g>
  
  <!-- Coupling/hitch detail -->
  <rect x="265" y="170" width="8" height="20" fill="#003d7a"/>
  
  <!-- Text "Karry" -->
  <text x="300" y="145" font-size="72" fill="#003d7a" text-anchor="middle" dominant-baseline="middle">Karry</text>
  
  <!-- Text "T" (orange accent) -->
  <text x="410" y="145" font-size="72" fill="#ff6d00" text-anchor="middle" dominant-baseline="middle">T</text>
</svg>